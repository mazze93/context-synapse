name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Verify generated artifacts are not tracked
        run: |
          set -euo pipefail
          tracked_generated=$(git ls-files | grep -E '(^|/)\.build/|(^|/)\.swiftpm/|(^|/)\.DS_Store$|(^|/)\.vscode/|(^|/)\.idea/' || true)
          if [ -n "$tracked_generated" ]; then
            echo "Tracked generated/editor artifacts detected:"
            echo "$tracked_generated"
            exit 1
          fi
